 ransomware:{label:'HERMES-07 // Ransomware',start:'start',nodes:{
  start:{clock:'07:14 — DETECTION',
   text:`SOC alert: workstation <b>HERMES-07</b> is making periodic outbound connections to an unfamiliar host. A user reports files renamed with a strange extension and a <b>README</b> dropped on the desktop. You have console access. What's your FIRST move?`,
   choices:[
    {label:`Reboot the machine to "clear" the malware`,to:'reboot',good:false,fb:`You just destroyed every volatile artifact — running processes, injected memory, live connections, keys in RAM. Order of volatility: capture memory FIRST.`},
    {label:`Capture a full RAM image before touching anything else`,to:'mem',good:true,fb:`Correct. Most volatile evidence first. The image freezes processes, injected code, and live C2 state.`},
    {label:`Open the README and start reading for clues`,to:'mem',good:false,fb:`Tempting, but premature — and you risk interacting with the live host. Image RAM first; the note will still be there. (Proceeding to acquisition.)`},
   ]},
  reboot:{clock:'07:16 — EVIDENCE LOST',
   text:`The box is back at the login screen. RAM is wiped. You've lost the injected payload, the live C2 socket, and any in-memory keys. Lesson logged — restart and capture memory first.`,
   choices:[{label:`↻ Restart: capture RAM first this time`,to:'mem',good:true,fb:`Resetting with the right instinct.`}]},
  mem:{clock:'07:22 — MEMORY',
   text:`You have <code>hermes07.raw</code>. Volatility is ready. Where do you look to surface a hidden intruder?`,
   choices:[
    {label:`pslist only — trust the active process list`,to:'mem',good:false,fb:`pslist walks the EPROCESS linked list, which DKOM can unlink. On its own it proves nothing. Cross-view it.`},
    {label:`Cross-view pslist vs psscan, then malfind + netscan`,to:'net',good:true,fb:`psscan reveals a process hidden from pslist; malfind flags an RX private region (injected shellcode); netscan recovers a C2 IP. Three leads in one pass.`},
   ]},
  net:{clock:'07:40 — NETWORK',
   text:`netscan gave you a C2 IP. You also have a perimeter <code>capture.pcap</code> for HERMES-07. What do you extract?`,
   choices:[
    {label:`Block the IP at the firewall and close the ticket`,to:'net',good:false,fb:`You've stopped one beacon and learned nothing about scope, tooling, or what was taken. Characterise before you contain-and-forget.`},
    {label:`Find the beacon cadence + JA3; carve any dropped file`,to:'disk',good:true,fb:`A 60s ±20% beacon (evasion-aware), a JA3 matching a known framework, and an HTTP-carved dropper you can hash. Now you know HOW it talks.`},
   ]},
  disk:{clock:'08:05 — DISK ARTIFACTS',
   text:`You image the disk. To establish persistence, execution, and tampering, which artifacts do you parse?`,
   choices:[
    {label:`$MFT ($SI vs $FN), ShimCache/AmCache, EVTX (4688/7045/1102)`,to:'bin',good:true,fb:`$FN/$SI disagree → the dropper was timestomped. AmCache proves it executed. A 7045 shows a malicious service; a 1102 shows logs were cleared. The timeline takes shape.`},
    {label:`Just check whether the dropper file still exists`,to:'bin',good:false,fb:`Presence/absence alone is weak — and the file may be deleted. Execution + persistence + tamper evidence is what builds the story. (Parsing artifacts anyway.)`},
   ]},
  bin:{clock:'08:40 — THE BINARY',
   text:`You have the carved dropper. strings is nearly empty and one section is near-8.0 entropy. How do you analyse it?`,
   choices:[
    {label:`Run it on your own workstation to "see what it does"`,to:'bin',good:false,fb:`Never detonate on your host — that spreads the incident. Use the isolated lab with a snapshot.`},
    {label:`It's packed → unpack at OEP, detonate in the sandbox, pair C2 with the code`,to:'report',good:true,fb:`You unpack, dump at OEP, confirm the ransomware behaviour dynamically, and pair the captured C2 with the send/crypto routine — closing the wire↔code loop.`},
   ]},
  report:{clock:'09:30 — RECONSTRUCTION',end:true,
   text:`Full chain: phishing dropper (timestomped) → injected, packed payload → malicious service for persistence → evasion-aware C2 (known framework via JA3) → file encryption → log clearing. You write it up: a super-timeline where every claim cites an artifact, an ATT&CK matrix, IOCs with provenance, Sigma/Suricata/YARA detections — plus an honest note on what the evidence does NOT prove.`,
   choices:[]},
 }},

 fileless:{label:'NItro // Fileless (LOLBin)',start:'start',nodes:{
  start:{clock:'10:02 — EDR ALERT',
   text:`EDR flags <b>winword.exe</b> spawning <b>powershell.exe</b> with a long encoded command. The user opened an "invoice" attachment. A disk scan finds <b>no malicious binary</b>. First move?`,
   choices:[
    {label:`Hunt the disk for the malware executable`,to:'logs',good:false,fb:`Fileless intrusions often drop nothing to disk — you'll burn time. The evidence lives in process lineage, script logs, and memory. (Pivoting there.)`},
    {label:`Pull the PowerShell logs + the parent→child process tree`,to:'logs',good:true,fb:`Right call. The Office→PowerShell lineage and 4104 scriptblock logs are exactly where a fileless attack shows itself.`},
    {label:`Reimage the machine immediately`,to:'logs',good:false,fb:`You'd destroy the only evidence and learn nothing about scope or C2. Investigate before you remediate. (Pulling logs instead.)`},
   ]},
  logs:{clock:'10:15 — LOGS',
   text:`Scriptblock logging (EVTX 4104) shows a <code>-enc</code> base64 PowerShell command. What now?`,
   choices:[
    {label:`Decode the base64 and read the script`,to:'decode',good:true,fb:`Decoded: it uses a trusted system binary to fetch and run an in-memory payload from a URL — a living-off-the-land download cradle.`},
    {label:`Dismiss it — encoded commands are normal noise`,to:'decode',good:false,fb:`Encoded one-liners spawned from Office are a classic execution technique, not noise. (Decoding it anyway.)`},
   ]},
  decode:{clock:'10:28 — THE CRADLE',
   text:`The decoded script uses a LOLBin to pull and execute a payload <b>in memory</b> from hxxp://… Where does the payload live?`,
   choices:[
    {label:`On disk in the Temp folder`,to:'mem',good:false,fb:`No — "in memory" is the whole point of fileless. There's nothing in Temp to find. Capture RAM and hunt the injected region. (Doing that.)`},
    {label:`In memory only — capture RAM and hunt the injected code`,to:'mem',good:true,fb:`Exactly. Fileless payloads are resident only in RAM, so memory forensics is the way to recover them.`},
   ]},
  mem:{clock:'10:45 — MEMORY',
   text:`RAM capture: powershell.exe holds an RX private region (malfind) and a live connection (netscan). Next?`,
   choices:[
    {label:`Dump the injected region, ID the framework, pull the C2`,to:'persist',good:true,fb:`The dumped shellcode matches a known offensive framework; netscan + the dump give you the C2 endpoint and beacon. Now scope persistence.`},
    {label:`Kill the process and stop`,to:'persist',good:false,fb:`Killing one process leaves persistence and scope unknown — it'll be back at reboot. Keep going. (Checking persistence.)`},
   ]},
  persist:{clock:'11:10 — PERSISTENCE',
   text:`Fileless threats often persist without a file. Where do you look?`,
   choices:[
    {label:`WMI event subscriptions + registry-stored scripts + scheduled tasks`,to:'net',good:true,fb:`You find a WMI event-consumer subscription re-launching the cradle at logon — fileless persistence with nothing on disk.`},
    {label:`Only the Startup folder`,to:'net',good:false,fb:`Too narrow — the Startup folder is empty here. WMI/registry/tasks are the fileless persistence homes. (Found a WMI subscription.)`},
   ]},
  net:{clock:'11:35 — SCOPE',
   text:`C2 is HTTPS; JA3 matches the framework; beacon every 45s ±30%. How do you scope the rest of the fleet?`,
   choices:[
    {label:`Hunt the JA3 + beacon pattern across proxy/EDR fleet-wide`,to:'report',good:true,fb:`The JA3 + cadence surface two more beaconing hosts — the intrusion is broader than HERMES-07. Now report.`},
    {label:`Assume it's a single isolated host`,to:'report',good:false,fb:`Assuming single-host scope is how intrusions get missed. The JA3/beacon pattern is exactly what scopes laterally. (Hunting fleet-wide anyway.)`},
   ]},
  report:{clock:'12:20 — RECONSTRUCTION',end:true,
   text:`Chain: malicious macro (initial access) → encoded PowerShell via LOLBin (execution, defense evasion: fileless) → in-memory framework payload → WMI subscription (persistence) → HTTPS C2 by JA3 (command & control) → two more victims (lateral scope). Detections: a Sigma rule for Office→PowerShell + 4104 cradle patterns, a Suricata rule on the JA3/beacon, YARA on the dumped payload — plus honest limits on what memory alone can prove.`,
   choices:[]},
 }},

 supply_chain:{label:'SOLAR-TRACE // Supply Chain',start:'start',nodes:{
  start:{clock:'Day 0 — ANOMALY',
   text:`Threat intel flags build <b>OrbisView IT Suite v8.4.2</b> as tampered. Your EDR shows <code>OrbisView.UpdateSvc.exe</code> making outbound connections to periodic DGA-pattern subdomains on 3,000 managed endpoints. What's your first move?`,
   choices:[
    {label:`Immediately uninstall OrbisView fleet-wide`,to:'start',good:false,fb:`Aggressive without confirming scope — you'd alert the adversary, destroy volatile evidence, and haven't traced whether lateral movement already occurred. Triage first.`},
    {label:`Hash the installed DLL and compare to the vendor's signed SHA-256`,to:'hash',good:true,fb:`Correct first pivot. If your installed copy mismatches the vendor's published checksum, you've confirmed supply chain compromise with a single operation.`},
    {label:`Assume EDR false positive — OrbisView does cloud telemetry`,to:'hash',good:false,fb:`Never assume. Consistent-length subdomains with no resolvable meaning = DGA beacon hallmark, not cloud telemetry. Verify the binary. (Checking hashes.)`},
   ]},
  hash:{clock:'Day 0+2h — BINARY',
   text:`Your installed <code>OrbisView.Core.dll</code> SHA-256 mismatches the vendor's published hash. Ghidra shows 3 KB of inserted code before the DLL entry point. What's in the inserted bytes?`,
   choices:[
    {label:`Analyze statically in Ghidra — look for sleep and DGA logic`,to:'backdoor',good:true,fb:`Ghidra reveals: sleep(14 days since install) → generate subdomain via DGA → if resolved IP matches XOR-fingerprinted block → load shellcode from registry. Textbook supply chain backdoor with dormancy.`},
    {label:`Run the tampered DLL in a sandbox immediately`,to:'backdoor',good:false,fb:`Don't run unknown code outside an isolated range — and a 14-day dormancy means the sandbox sees nothing. Static analysis first. (Analyzing in Ghidra.)`},
   ]},
  backdoor:{clock:'Day 0+6h — BACKDOOR LOGIC',
   text:`The backdoor sleeps 14 days post-install before activating. Registry keys on active hosts hold encrypted shellcode blobs. How do you separate active (activated) from dormant (still sleeping) hosts?`,
   choices:[
    {label:`Fleet query: OrbisView v8.4.2 installed AND install date > 14 days ago`,to:'scope',good:true,fb:`Fleet query returns 847 of 3,000 hosts. These have active backdoors. The remaining 2,153 are dormant — critical to keep separate for containment sequencing.`},
    {label:`Assume all 3,000 are equally compromised and take all offline`,to:'scope',good:false,fb:`Business impact without proportionate evidence. 2,153 hosts have inactive backdoors that haven't called home. Scope first, then contain by tier. (Querying fleet.)`},
   ]},
  scope:{clock:'Day 1 — SCOPE',
   text:`847 hosts confirmed active — netscan shows live DGA beacon connections. How do you enumerate which hosts are actively communicating without alerting the adversary?`,
   choices:[
    {label:`Sinkhole the DGA domains — redirect all beacon traffic to your controlled server`,to:'hunt',good:true,fb:`Sinkholing logs all 847 IPs phoning home without alerting the adversary. You now have ground-truth scope and a passive log of beacon timing.`},
    {label:`Block all outbound from the 847 hosts at the perimeter firewall`,to:'hunt',good:false,fb:`Hard blocking immediately tips off the adversary and ends your visibility window. Sinkhole first to enumerate; contain in sequenced waves after. (Sinkholing.)`},
   ]},
  hunt:{clock:'Day 1+8h — THREAT HUNT',
   text:`847 confirmed beacons sinkholed. Now determine: did any hosts execute a second stage or move laterally before containment?`,
   choices:[
    {label:`Hunt: OrbisView child processes · unusual LSASS access · new scheduled tasks · SMB/WMI lateral signs`,to:'report',good:true,fb:`You find 12 hosts with second-stage execution; 3 with LSASS dumps attempted (credential access T1003.001); 2 with confirmed lateral movement via SMB pass-the-hash. Priority tier identified.`},
    {label:`Reimage all 847 simultaneously — clean sweep`,to:'report',good:false,fb:`You'd destroy forensic evidence and miss the 12 hosts where credentials may already be stolen and in use. Triage tiers matter — remediate last, investigate first. (Hunting post-exploitation.)`},
   ]},
  report:{clock:'Day 2 — RECONSTRUCTION',end:true,
   text:`Full chain: tampered vendor DLL signed with real cert (T1195.002 Software Supply Chain) → 14-day dormancy (T1497 Sandbox Evasion) → DGA beacon (T1568.002) → shellcode loaded from registry — fileless (T1055) → LSASS dump on 12 hosts (T1003.001) → lateral movement on 2 via pass-the-hash (T1550.002). Detections: YARA on the 3 KB inserted blob, Sigma on OrbisView child processes + LSASS access, Suricata on DGA cadence. Honest gaps: exfiltration volume before sinkholing is unquantified; attribution beyond TTPs is circumstantial.`,
   choices:[]},
 }},

 insider:{label:'EXODUS-9 // Insider Threat',start:'start',nodes:{
  start:{clock:'14:30 — HR REFERRAL',
   text:`HR flags <b>Marcus Webb</b>, a departing senior engineer, for a policy violation: 48 GB of data was copied to an external USB the week before he gave notice. DLP caught it late. You have his workstation, a SIEM, and an AD event log. What do you triage first?`,
   choices:[
    {label:`Pull USB artifact timeline from the registry and Windows events`,to:'usb',good:true,fb:`Correct — registry (USBSTOR hive), Event ID 6416 (new device), and ShellBags give you device PnP timestamps, volume labels, and folder access patterns within seconds of log review.`},
    {label:`Immediately interview Marcus to get his explanation`,to:'usb',good:false,fb:`Interviewing before you have evidence is tactically weak — he can deny everything and you can't contradict him. Build the artifact timeline first. (Pulling artifacts.)`},
    {label:`Image the USB drive he used`,to:'usb',good:false,fb:`The USB is with Marcus — you don't have it yet. Start with what you have: the workstation artifacts. (Analyzing workstation first.)`},
   ]},
  usb:{clock:'14:50 — USB ARTIFACTS',
   text:`Registry and EVTX confirm: device "SANDISK 64GB" first plugged in 9 days ago, last seen 3 days ago — 5 sessions total, averaging 90 minutes. Folder access (ShellBags) shows <code>D:\Projects\Athena\</code> and <code>D:\exports\</code>. What's the Athena project?`,
   choices:[
    {label:`Query SharePoint/Active Directory for the Athena project's sensitivity classification`,to:'athena',good:true,fb:`AD group membership shows Athena is a classified R&D project — source code for your next-gen product. Marcus's role gave him legitimate read access, but copying 48 GB to removable media violated DLP policy.`},
    {label:`Immediately revoke his network credentials`,to:'athena',good:false,fb:`Revoking credentials alerts him and may trigger evidence destruction if he has remote copies. Scope and assess first. (Checking classification.)`},
   ]},
  athena:{clock:'15:15 — SCOPE',
   text:`Athena is IP-sensitive source code. The 48 GB is a near-complete repository copy. Did Marcus exfiltrate beyond the USB — cloud sync, personal email, SFTP?`,
   choices:[
    {label:`Pull proxy logs + DLP events for cloud upload patterns over the last 30 days`,to:'cloud',good:true,fb:`Proxy logs show: 14 GB uploaded to a personal Google Drive account over 4 days, 2 weeks before notice was given. DLP flagged it but the alert was miscategorised. Two exfil vectors confirmed.`},
    {label:`Assume the USB is the only vector and scope the damage from there`,to:'cloud',good:false,fb:`Single-vector assumption misses the cloud upload. Always hunt all outbound channels: cloud sync, email attachments, webmail, SFTP, DNS tunneling. (Checking proxy logs.)`},
   ]},
  cloud:{clock:'15:55 — CONTAINMENT',
   text:`Two confirmed vectors: USB (48 GB) + Google Drive (14 GB). Marcus is still employed for 2 more days. How do you contain without destroying evidence or causing legal complications?`,
   choices:[
    {label:`Coordinate with Legal/HR: silent monitoring + preserve forensic copies + revoke access on final day`,to:'report',good:true,fb:`Coordinating with Legal ensures evidence is preserved correctly for potential litigation. Silent monitoring during his last 2 days confirms no further exfil. Revocation on exit is clean and defensible.`},
    {label:`Lock his account immediately and confiscate his laptop`,to:'report',good:false,fb:`Without Legal sign-off, immediate confiscation may be legally improper and taint evidence chain of custody. Always loop Legal into insider threat cases before action. (Coordinating with Legal.)`},
   ]},
  report:{clock:'16:45 — RECONSTRUCTION',end:true,
   text:`Full timeline: 30 days before notice → Google Drive exfil (14 GB, T1567.002 Exfil to Cloud Storage) → 9 days before notice → USB exfil sessions (48 GB, T1052.001 Exfiltration over USB) → DLP alert miscategorised → HR flag → investigation. Evidence: USBSTOR registry, EVTX 6416, ShellBags, proxy logs, DLP events. Legal actions: preservation hold on his corporate accounts, Google served with legal process for Drive activity. Lesson: DLP alerts require a review SLA — miscategorised alerts are as dangerous as missed alerts.`,
   choices:[]},
 }},
};

function checkBadges(){
 if(!P.badges)P.badges={};
 const learnedCount=Object.keys(P.learned||{}).filter(k=>P.learned[k]).length;
 const quizRight=Object.values(P.quiz||{}).filter(v=>v===1).length;
 const cardsKnown=Object.values(P.cards||{}).filter(Boolean).length;
 const masteredPhases=PHASES.filter(p=>phaseMastery(p)===100).length;
 const ov=overall();
 const checks={
  first_step:learnedCount>0, five_concepts:learnedCount>=5,
  all_p1:phaseMastery(PHASES[0])===100, five_phases:masteredPhases>=5, full_mastery:masteredPhases===12,
  quiz_ten:quizRight>=10, quiz_twentyfive:quizRight>=25,
  cards_fifteen:cardsKnown>=15, cards_fifty:cardsKnown>=50,
  lab_opened:!!(P.labOpened), case_started:!!(P.caseStarted),
  case_won:!!(P.casesWon&&P.casesWon.length), two_cases:!!(P.casesWon&&P.casesWon.length>=2),
  attack_viewed:!!(P.attackViewed), note_written:Object.values(P.notes||{}).some(n=>n&&n.trim().length>0),
  half_mastery:ov>=50,
  df_started:PHASES.some(p=>p.tracks.includes('DF')&&Object.keys(P.learned||{}).some(k=>k.startsWith(p.id)&&P.learned[k])),
  re_started:PHASES.some(p=>p.tracks.includes('RE')&&Object.keys(P.learned||{}).some(k=>k.startsWith(p.id)&&P.learned[k])),
  ma_started:PHASES.some(p=>p.tracks.includes('MA')&&Object.keys(P.learned||{}).some(k=>k.startsWith(p.id)&&P.learned[k])),
  export_done:!!(P.exportDone), exam_taken:!!(P.examTaken), arsenal_searched:!!(P.arsenalSearched),
 };
 let won=false;
 BADGES.forEach(b=>{
  if(!P.badges[b.id]&&checks[b.id]){P.badges[b.id]=Date.now();toast('Achievement: '+b.name+' ★');won=true;}
 });
 if(won){store.set('blackvault',JSON.stringify(P));updateFootBadges();}
}

function phaseMastery(p){
  const cTot=p.concepts.length,cDone=p.concepts.filter((_,i)=>P.learned[p.id+':'+i]).length;
  const qTot=p.quiz.length,qDone=p.quiz.filter((_,i)=>P.quiz[p.id+':'+i]===1).length;
  const tot=cTot+qTot, done=cDone+qDone; return tot?Math.round(done/tot*100):0;
}
function overall(){const a=PHASES.map(phaseMastery);return Math.round(a.reduce((x,y)=>x+y,0)/PHASES.length);}

  for(let j=pool.length-1;j>0;j--){const r=Math.floor(Math.random()*(j+1));[pool[j],pool[r]]=[pool[r],pool[j]];}
  state.examSet=pool.slice(0,Math.min(15,pool.length));state.examPicks={};state.examSubmitted=false;
}
function viewExam(){
  if(!state.examSet)startExam();

    const grade=pct>=90?'A':pct>=80?'B':pct>=70?'C':pct>=60?'D':'F';
    html+=`<div class="score"><span>RESULT</span><b>${correct} / ${set.length}</b><span style="font-family:var(--mono);font-size:13px;color:${pct>=70?'var(--amber)':'var(--blood)'}">${pct}% · grade ${grade}</span></div>`;

 {tag:'XOR gate', fn:'xor_gate', obj:'l1', sol:'pwnage',

  asm:[

   {a:'0x1192',by:'3a 0c 02',mn:'cmp cl, [rdx+rax]',cm:'== key[i] ?'},
   {a:'0x1195',by:'74 07',mn:'je 0x119e',pj:'jmp 0x119e',jmp:1,cm:'equal → next. patch to always pass'},

<span class="kw">int</span> xor_gate(<span class="kw">char</span> *input) {

   {a:'0x11ea',by:'41 01 c0',mn:'add r8d, eax',cm:'sum += ...'},
   {a:'0x11ed',by:'48 ff c1',mn:'inc rcx ; cmp rcx,8 ; jl 0x11d8'},
   {a:'0x11f5',by:'.. 6b .. 17',mn:'mod = sum % 17'},
   {a:'0x11f9',by:'85 c0',mn:'test mod, mod'},
   {a:'0x11fb',by:'75 09',mn:'jne 0x1206',cm:'sum % 17 != 0 → fail'},
   {a:'0x11fd',by:'80 3f 34',mn:"cmp byte [rdi], '4'"},
   {a:'0x1200',by:'75 04',mn:'jne 0x1206',pj:'nop ; nop',jmp:1,cm:"serial[0] != '4' → fail. patch the last gate"},
   {a:'0x1202',by:'b8 01 ..',mn:'mov eax, 1',cm:'valid!'},

function pcapBuild(){
 if(LAB.pkts)return;
 const flag='BV{dns_7unnel}', victim='10.0.2.15', dnssrv='10.0.2.3', dom='cdn-telemetry.xyz';
 let hex=''; for(const ch of flag)hex+=ch.charCodeAt(0).toString(16).padStart(2,'0');
 const chunks=[]; for(let i=0;i<hex.length;i+=4)chunks.push(hex.slice(i,i+4));
 const pk=[]; let no=1; const add=o=>{o.no=no++;pk.push(o);};
 const dnsDetail=q=>`Domain Name System (query)\n    Transaction ID: 0x${(0x1000+q.no).toString(16)}\n    Flags: 0x0100 Standard query\n    Questions: 1\n    Queries:\n        ${q.qname}: type A, class IN`;
 add({t:'0.000000',proto:'DNS',src:victim,dst:dnssrv,info:'Standard query A www.google.com',qname:'www.google.com'});
 add({t:'0.013442',proto:'DNS',src:dnssrv,dst:victim,info:'Standard query response A 142.250.72.196',qname:'www.google.com'});
 add({t:'0.241006',proto:'TLS',src:victim,dst:'142.250.72.196',info:'Client Hello (SNI=www.google.com)'});
 add({t:'1.004221',proto:'HTTP',src:victim,dst:'93.184.216.34',info:'GET /index.html HTTP/1.1'});
 let exfilNo=0;
 const interleave=[ {t:'3.110',extra:{proto:'DNS',src:victim,dst:dnssrv,info:'Standard query A pool.ntp.org',qname:'pool.ntp.org'}},
                    {t:'5.880',extra:{proto:'HTTP',src:victim,dst:'93.184.216.34',info:'GET /style.css HTTP/1.1'}},
                    {t:'9.540',extra:{proto:'TLS',src:victim,dst:'13.107.42.14',info:'Application Data'}} ];
 chunks.forEach((c,i)=>{
   const q=`s${i}-${c}.${dom}`;
   add({t:(2.5+i*0.9).toFixed(6),proto:'DNS',src:victim,dst:dnssrv,info:'Standard query A '+q,qname:q,exfil:true,seq:i,chunk:c});
   if(interleave[exfilNo]&&i%2===1){add(interleave[exfilNo].extra);exfilNo++;}
 });
 add({t:'12.660000',proto:'DNS',src:victim,dst:dnssrv,info:'Standard query A update.microsoft.com',qname:'update.microsoft.com'});
 pk.forEach(q=>{ if(q.proto==='DNS'&&!q.detail)q.detail=dnsDetail(q)+(q.exfil?`\n\n[ note: ${q.qname.split('.')[0]} is not a hostname — it is base16 data smuggled in the subdomain ]`:''); });
 LAB.pkts=pk; LAB.pcapMeta={dom,victim,flag,count:chunks.length};
}
function pcapMatch(q,f){
 f=f.trim().toLowerCase(); if(!f)return true;
 if(f==='dns')return q.proto==='DNS';
 if(f==='http')return q.proto==='HTTP';
 if(f==='tls')return q.proto==='TLS';
 let m=f.match(/^ip\.addr\s*==\s*(.+)$/); if(m)return q.src.includes(m[1].trim())||q.dst.includes(m[1].trim());
 m=f.match(/^dns\.qry\.name\s+contains\s+(.+)$/); if(m)return (q.qname||'').toLowerCase().includes(m[1].trim());
 return (q.info+' '+(q.qname||'')+' '+q.src+' '+q.dst+' '+q.proto).toLowerCase().includes(f);
}
function pcapRows(){
 return LAB.pkts.filter(q=>pcapMatch(q,LAB.pcapFilter)).map(q=>`<tr data-pktrow="${q.no}" data-sel="${LAB.pcapSel===q.no?1:0}"><td>${q.no}</td><td>${q.t}</td><td class="pr-${q.proto}">${q.proto}</td><td>${q.src}</td><td>${q.dst}</td><td>${esc(q.info)}</td></tr>`).join('');
}
function pcapPaint(){const b=document.getElementById('pkttbody');if(b)b.innerHTML=pcapRows();}
function pcapSelect(no){LAB.pcapSel=no;pcapPaint();const q=LAB.pkts.find(x=>x.no===no);const d=document.getElementById('pktdetail');if(d)d.textContent=q?(q.detail||`Frame ${q.no}: ${q.proto}\n  ${q.src} → ${q.dst}\n  ${q.info}`):'';}
function pcapReassemble(){
 const ex=LAB.pkts.filter(q=>q.exfil).sort((a,b)=>a.seq-b.seq);
 const hex=ex.map(q=>q.chunk).join('');
 let s=''; for(let i=0;i<hex.length;i+=2)s+=String.fromCharCode(parseInt(hex.substr(i,2),16));
 const d=document.getElementById('pktdetail');
 if(d)d.textContent='Reassembling '+ex.length+' exfil subdomains, sorted by seq:\n  '+ex.map(q=>q.chunk).join(' ')+'\n  hex → '+hex+'\n\n  DECODED: '+s;
 setObj('pcap','flag');
}

 if(vic==='10.0.2.15'){setObj('pcap','victim');any=true;} else if(vic)toast('that host is not the source of the exfil queries');
 if(cnt===String(LAB.pcapMeta.count)){setObj('pcap','count');any=true;} else if(cnt)toast('recount — filter to just the exfil queries');

}

function cyCaesar(s,k){k=((k%26)+26)%26;return s.replace(/[a-z]/g,c=>String.fromCharCode((c.charCodeAt(0)-97+k)%26+97)).replace(/[A-Z]/g,c=>String.fromCharCode((c.charCodeAt(0)-65+k)%26+65));}
function cyXorStr(s,k){let o='';for(let i=0;i<s.length;i++)o+=String.fromCharCode(s.charCodeAt(i)^k);return o;}
function cyHex(s){let o='';for(let i=0;i<s.length;i++)o+=s.charCodeAt(i).toString(16).padStart(2,'0');return o;}
function cyFromHex(s){s=s.replace(/[^0-9a-fA-F]/g,'');let o='';for(let i=0;i+1<s.length+1;i+=2){if(i+2>s.length)break;o+=String.fromCharCode(parseInt(s.substr(i,2),16));}return o;}
const CY={
 rot:{flag:'BV{r0t_and_r0ll}', enc:()=>cyCaesar('BV{r0t_and_r0ll}',7)},
 b64:{flag:'BV{b4se_st4ck}',  enc:()=>btoa(btoa('BV{b4se_st4ck}'))},
 xor:{flag:'BV{x0r_me_42}',   enc:()=>cyHex(cyXorStr('BV{x0r_me_42}',0x42))},
 rev:{flag:'BV{m1rror_m1rror}',enc:()=>'BV{m1rror_m1rror}'.split('').reverse().join('')},
};
function cyPaint(){const el=document.getElementById('cybuf');if(el)el.textContent=LAB.cy||'(empty — load a challenge above)';
 Object.keys(CY).forEach(k=>{ if(LAB.cy===CY[k].flag)setObj('crypto',k); });}
function cyLoad(w){LAB.cy=CY[w].enc();cyPaint();toast('loaded '+w+' challenge');}
function cyOp(op){
 try{
  if(op==='clear')LAB.cy='';
  else if(op==='rot13')LAB.cy=cyCaesar(LAB.cy,13);
  else if(op==='caesar'){const n=parseInt(gv('cyshift')||'0',10)||0;LAB.cy=cyCaesar(LAB.cy,n);}
  else if(op==='b64')LAB.cy=atob(LAB.cy);
  else if(op==='hex')LAB.cy=cyFromHex(LAB.cy);
  else if(op==='xor'){const n=parseInt(gv('cykey').replace(/0x/i,''),16);if(!isNaN(n))LAB.cy=cyXorStr(LAB.cy,n&0xff);}
  else if(op==='rev')LAB.cy=LAB.cy.split('').reverse().join('');
 }catch(e){toast('that op failed on the current buffer');}
 cyPaint();
}

function pwnStackHtml(fill,tgt,win){
 const overRbp=fill>16, atRet=fill===24&&tgt, overshoot=fill>24;
 const retVal=atRet?tgt:(overshoot?"'A'×8 (overshot)":'intact');
 return `<div class="srow buf ${fill>0?'ow':''}"><span>char buf[16]</span><b>${fill>=16?"'A'×16 (full)":"'A'×"+fill}</b></div>
 <div class="srow rbp ${overRbp?'ow':''}"><span>saved RBP (8)</span><b>${overRbp?'clobbered':'intact'}</b></div>
 <div class="srow ret ${(atRet||overshoot)?'ow':''}"><span>saved RIP / ret (8)</span><b>${retVal}</b></div>
 <div class="srow"><span>ret jumps to →</span><b>${atRet&&tgt===win?'win() → /bin/sh':((atRet||overshoot)?'crash (SIGSEGV)':'normal return')}</b></div>`;
}
function pwnRender(){

 else if(atRet)msg='<span class="err">[!] you overwrote the return address with '+esc(tgt)+' → SIGSEGV. Aim those 8 bytes at win() (0x401162).</span>';
 else if(fill>24)msg='<span class="err">[!] overshot: '+fill+' filler bytes ran past the return slot. Use exactly 24, then the address.</span>';
 else if(fill>16)msg='<span class="dim">into the saved RBP ('+fill+'/24). A few more filler bytes reach the return address.</span>';
 else msg='<span class="dim">buffer is '+fill+'/16 full. Fill 16 (buf) + 8 (saved RBP) = 24, then pick an address.</span>';
 const o=document.getElementById('pw_out');if(o)o.innerHTML=msg;

/* ---- 10 · PROTOCOL ---- */
function protoBuild(){if(LAB.protoFrames)return;const key=0x5a;const msgs=[[0x01,'ID=BV01'],[0x02,'whoami'],[0x03,'BV{pr0t0_r3}']];const bytes=[];msgs.forEach(m=>{const pl=m[1].split('').map(c=>c.charCodeAt(0)^key);bytes.push(0xBE,0xEF,pl.length&0xff,(pl.length>>8)&0xff,m[0]);pl.forEach(b=>bytes.push(b));});LAB.protoBytes=bytes;LAB.protoFrames=msgs.length;LAB.protoKeyVal=key;}
function protoHex(){protoBuild();return LAB.protoBytes.map((b,i)=>b.toString(16).padStart(2,'0')).join(' ');}
function protoParse(){protoBuild();const o=document.getElementById('pr_out');if(!o)return;const b=LAB.protoBytes;let s='',i=0,n=0;while(i<b.length){if(b[i]===0xBE&&b[i+1]===0xEF){const len=b[i+2]|(b[i+3]<<8),op=b[i+4];s+='frame '+(++n)+': magic BE EF  len='+len+'  opcode=0x0'+op+'  payload['+len+']\n';i+=5+len;}else i++;}o.textContent=s+'\n→ framing = [BE EF][len:2 LE][opcode:1][payload:len]';}
function protoDecode(){protoBuild();const o=document.getElementById('pr_out');if(!o)return;const k=parseInt(gv('pr_key').replace(/0x/i,''),16);if(isNaN(k)){o.textContent='enter a hex XOR key first (try 5a).';return;}const b=LAB.protoBytes;let s='',i=0;const names={1:'BEACON',2:'EXEC',3:'EXFIL'};while(i<b.length){if(b[i]===0xBE&&b[i+1]===0xEF){const len=b[i+2]|(b[i+3]<<8),op=b[i+4];let pl='';for(let j=0;j<len;j++)pl+=String.fromCharCode(b[i+5+j]^k);s+='['+(names[op]||('op'+op))+'] '+pl+'\n';i+=5+len;}else i++;}o.innerHTML='decoded with key 0x'+k.toString(16)+':\n<span class="hl">'+esc(s)+'</span>';if(k===LAB.protoKeyVal){setObj('protocol','key');if(/whoami|BV\{/.test(s))setObj('protocol','cmd');}}
function protoCheck(){if(/be\s*ef/i.test(gv('pr_magic').replace(/0x/ig,'')))setObj('protocol','magic');else if(gv('pr_magic'))toast('the 2 bytes that start every frame');
 if(gv('pr_frames').trim()===String(LAB.protoFrames))setObj('protocol','frames');else if(gv('pr_frames'))toast('count the BE EF markers');}
function labProtocol(){protoBuild();
 return `<p class="lede" style="margin-top:0">A raw capture of a custom C2 protocol. No RFC — reverse the structure from the bytes.</p>
 <div class="pktdetail" style="margin-top:0">${protoHex()}</div>
 <div class="qchips" style="margin-top:12px"><button data-protoact="parse">auto-frame</button><button data-protoact="decode">decode payloads (XOR)</button> <input id="pr_key" class="lab-sel" style="width:80px" placeholder="key hex 5a"></div>

}

  if(m==='map')html=viewMap();
  else if(m==='study')html=viewStudy();
  else if(m==='drill')html=viewDrill();
  else if(m==='quiz')html=viewQuiz();
  else if(m==='review')html=viewReview();
  else if(m==='exam')html=viewExam();
  else if(m==='arsenal')html=viewArsenal();
  else if(m==='threads')html=viewThreads();
  else if(m==='case')html=viewCase();
  else if(m==='attack')html=viewAttack();
  else if(m==='badges')html=viewBadges();
  else if(m==='range')html=viewRange();
  app().innerHTML=html;
  document.querySelectorAll('#nav button').forEach(b=>b.setAttribute('aria-current', b.dataset.go===m?'true':'false'));
  if(m==='arsenal'){const s=$('#searchBox');if(s){s.focus();s.setSelectionRange(s.value.length,s.value.length);}}
  if(m==='range'&&state.lab&&typeof LABINIT==='object'&&LABINIT[state.lab])LABINIT[state.lab]();
  window.scrollTo(0,0);
  updateFootBadges();
}
function go(mode){state.mode=mode;state.lab=null;render();}

/* ============================================================ EVENTS ============================================================ */
document.addEventListener('click',e=>{
  const t=e.target;
  const cp=t.closest('[data-copy]');
  if(cp){navigator.clipboard&&navigator.clipboard.writeText(cp.textContent).then(()=>toast('copied'),()=>{});return;}
  const goEl=t.closest('[data-go]');
  if(goEl){const g=goEl.dataset.go;if(g==='quizall'){state.quizPhase=null;go('quiz');return;}go(g);return;}
  const node=t.closest('[data-phase]');
  if(node&&!t.closest('[data-phaselab]')){state.phase=+node.dataset.phase;go('study');return;}
  const learn=t.closest('[data-learn]');
  if(learn){const k=learn.dataset.learn;P.learned[k]=!P.learned[k];save();render();return;}
  const qp=t.closest('[data-quizphase]');
  if(qp){state.quizPhase=+qp.dataset.quizphase;go('quiz');return;}

  const fc=t.closest('[data-flipcard]'); if(fc){state.flip=!state.flip;render();return;}
  const cd=t.closest('[data-card]');
  if(cd){const a=cd.dataset.card;const cards=deckCards();const cur=cards[state.cardIdx];
    if(a==='next'){state.cardIdx=(state.cardIdx+1)%cards.length;state.flip=false;}
    if(a==='prev'){state.cardIdx=(state.cardIdx-1+cards.length)%cards.length;state.flip=false;}
    if(a==='know'){P.cards[cur.id+':'+cur.f]=!P.cards[cur.id+':'+cur.f];save();}
    if(a==='shuffle'){PHASES.forEach(p=>p.cards.sort(()=>Math.random()-.5));state.cardIdx=0;state.flip=false;toast('shuffled');}
    render();return;}
  const dk=t.closest('[data-deck]'); if(dk){state.deck=dk.dataset.deck;state.cardIdx=0;state.flip=false;render();return;}

  const opt=t.closest('[data-quiz]');
  if(opt){const key=opt.dataset.quiz;const pick=+opt.dataset.opt;
    if(P.quizPick[key]!=null)return;P.quizPick[key]=pick;
    const [pid,idx]=key.split(':');const p=PHASES.find(x=>x.id===pid);
    P.quiz[key]=p.quiz[+idx].a===pick?1:0;save();render();return;}

  const retry=t.closest('[data-retry]');
  if(retry){const k=retry.dataset.retry;delete P.quizPick[k];delete P.quiz[k];save();render();return;}
  const rd=t.closest('[data-reviewdrill]'); if(rd){state.deck='weak';state.cardIdx=0;state.flip=false;if(!P.reviewDone){P.reviewDone=true;save();}go('drill');return;}

  const exo=t.closest('[data-exopt]');
  if(exo&&!state.examSubmitted){state.examPicks[+exo.dataset.exopt]=+exo.dataset.o;render();return;}
  const ex=t.closest('[data-exam]');
  if(ex){if(ex.dataset.exam==='new'){startExam();render();}else if(ex.dataset.exam==='submit'){state.examSubmitted=true;if(!P.examTaken){P.examTaken=true;save();}render();}return;}

  const pt=t.closest('[data-ptier]'); if(pt){pt.dataset.open=pt.dataset.open==='1'?'0':'1';return;}
  const kc=t.closest('[data-kc]'); if(kc){kc.dataset.open=kc.dataset.open==='1'?'0':'1';return;}

  const cid=t.closest('[data-caseid]');
  if(cid){state.caseId=cid.dataset.caseid;state.caseNode=CASES[state.caseId].start;state.caseGood=0;state.caseBad=0;state.caseFb=null;
    if(!P.caseStarted){P.caseStarted=true;save();}render();return;}
  const ch=t.closest('[data-choice]');
  if(ch){const C=CASES[state.caseId];const node=C.nodes[state.caseNode];const choice=node.choices[+ch.dataset.choice];
    if(choice.good)state.caseGood++;else state.caseBad++;state.caseFb={good:choice.good,msg:choice.fb};state.caseNode=choice.to;
    const newNode=C.nodes[choice.to];
    if(newNode&&newNode.end){if(!P.casesWon.includes(state.caseId))P.casesWon.push(state.caseId);save();}
    render();return;}
  const cs=t.closest('[data-case]');
  if(cs&&cs.dataset.case==='restart'){state.caseNode=CASES[state.caseId].start;state.caseGood=0;state.caseBad=0;state.caseFb=null;render();return;}

  const ma=t.closest('[data-mapaction]');
  if(ma){
    if(ma.dataset.mapaction==='export'){
      const data={exported:new Date().toISOString(),overall:overall()+'%',phases:PHASES.map(p=>({n:p.n,title:p.title,mastery:phaseMastery(p)+'%'})),badges:Object.keys(P.badges||{}).map(id=>{const b=BADGES.find(x=>x.id===id);return b?b.name:'?';}),casesWon:P.casesWon||[],notes:P.notes||{}};
      const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
      const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='blackvault-progress.json';a.click();
      P.exportDone=true;save();toast('Progress exported as JSON');return;
    }
    if(ma.dataset.mapaction==='shortcuts'){state.shortcutsOpen=true;showShortcuts();return;}
  }
});

document.addEventListener('input',e=>{
 if(e.target.id==='searchBox'){state.search=e.target.value;
  if(!P.arsenalSearched&&state.search.length>1){P.arsenalSearched=true;save();}
  const q=(state.search||'').toLowerCase();
  const all=PHASES.flatMap(p=>p.commands.map(c=>({...c,n:p.n,title:p.title})));
  const rows=all.filter(c=>!q||c.c.toLowerCase().includes(q)||c.d.toLowerCase().includes(q)||c.title.toLowerCase().includes(q));
  const wrap=document.querySelector('.arsenal');
  if(wrap)wrap.innerHTML=rows.map(c=>`<div class="tool"><small>PHASE ${c.n} · ${esc(c.title)}</small><br><code data-copy>${esc(c.c)}</code><p>${esc(c.d)}</p></div>`).join('')||'<p style="color:var(--ash);font-family:var(--mono)">No commands match that search.</p>';
 }
 if(e.target.id==='phaseNotes'){
  const pid=e.target.dataset.phaseid;
  if(pid){P.notes[pid]=e.target.value;save();}
 }
});

document.addEventListener('keydown',e=>{
  if(e.key==='?'&&e.target.tagName!=='INPUT'&&e.target.tagName!=='TEXTAREA'){state.shortcutsOpen=!state.shortcutsOpen;showShortcuts();return;}
  if(e.key==='Escape'&&state.shortcutsOpen){state.shortcutsOpen=false;showShortcuts();return;}
  if(state.mode!=='drill')return;const cards=deckCards();if(!cards.length)return;
  if(e.code==='Space'){e.preventDefault();state.flip=!state.flip;render();}
  else if(e.code==='ArrowRight'){state.cardIdx=(state.cardIdx+1)%cards.length;state.flip=false;render();}
  else if(e.code==='ArrowLeft'){state.cardIdx=(state.cardIdx-1+cards.length)%cards.length;state.flip=false;render();}
  else if(e.key.toLowerCase()==='k'){const cur=cards[state.cardIdx];P.cards[cur.id+':'+cur.f]=!P.cards[cur.id+':'+cur.f];save();render();}
});

function showShortcuts(){
 let el=document.getElementById('shortcutsOverlay');
 if(state.shortcutsOpen){
  if(!el){
   el=document.createElement('div');el.id='shortcutsOverlay';el.className='shortcuts-overlay';
   el.innerHTML=`<div class="shortcuts-box">
    <h2>Keyboard Shortcuts</h2>
    <table>
     <tr><td>? </td><td>Toggle this panel</td></tr>
     <tr><td>Esc</td><td>Close this panel</td></tr>
     <tr><td>Space</td><td>Flip flashcard (Drill mode)</td></tr>
     <tr><td>←  →</td><td>Previous / Next flashcard</td></tr>
     <tr><td>K</td><td>Mark flashcard as Known / Unknown</td></tr>
    </table>
    <p style="margin-top:16px;font-size:12px;color:var(--ash)">Navigate with the top bar. Click any Phase node on the Map to jump straight to Study. Use <b style="color:var(--bone)">Export Progress</b> on the Map page to save a JSON report.</p>
    <button class="shortcuts-close" id="shortcutsCloseBtn">Close  [Esc]</button>
   </div>`;
   document.body.appendChild(el);
   document.getElementById('shortcutsCloseBtn').onclick=()=>{state.shortcutsOpen=false;showShortcuts();};
   el.addEventListener('click',ev=>{if(ev.target===el){state.shortcutsOpen=false;showShortcuts();}});
  } else {el.style.display='flex';}
 } else {if(el)el.style.display='none';}
}

/* ===== RANGE events ===== */
document.addEventListener('click',e=>{
 const t=e.target;
 const open=t.closest('[data-lab]'); if(open){state.lab=open.dataset.lab; if(!P.labOpened){P.labOpened=true;save();} render(); return;}
 const back=t.closest('[data-labback]'); if(back){state.lab=null; render(); return;}
 const mq=t.closest('[data-memq]'); if(mq){memRun(mq.dataset.memq); const i=document.getElementById('memcmd'); if(i){i.value='';i.focus();} return;}
 const ms=t.closest('[data-memsubmit]'); if(ms){memCheck(); return;}
 const rl=t.closest('[data-relvl]'); if(rl){state.reLvl=+rl.dataset.relvl; LAB.reVerdict={}; render(); return;}
 const rj=t.closest('[data-rejmp]'); if(rj){LAB.rePatched[state.reLvl]=!LAB.rePatched[state.reLvl]; LAB.reVerdict={}; render(); return;}
 const rt=t.closest('[data-retest]'); if(rt){reTest(); return;}
 const rsol=t.closest('[data-resol]'); if(rsol){const c=CRACK[state.reLvl]; const el=document.getElementById('reverdict'); if(el){el.textContent='answer: '+c.sol; el.className='verdict ok';} return;}
 const pr=t.closest('[data-pktrow]'); if(pr){pcapSelect(+pr.dataset.pktrow); return;}
 const pre=t.closest('[data-pcapreasm]'); if(pre){pcapReassemble(); return;}
 const ps=t.closest('[data-pcapsubmit]'); if(ps){pcapCheck(); return;}
 const lt=t.closest('[data-logtab]'); if(lt){LAB.logTab=lt.dataset.logtab; render(); return;}
 const ls=t.closest('[data-logsubmit]'); if(ls){logCheck(); return;}
});
document.addEventListener('keydown',e=>{
 if(e.key!=='Enter')return;
 if(e.target.id==='memcmd'){const v=e.target.value; e.target.value=''; memRun(v); e.target.focus(); e.preventDefault();}
 else if(e.target.id==='reinput'){reTest(); e.preventDefault();}
});
document.addEventListener('input',e=>{
 if(e.target.id==='pcapfilter'){LAB.pcapFilter=e.target.value; pcapPaint();}
 else if(e.target.id==='logfilter'){LAB.logFilter=e.target.value; logPaint();}
});

renderMeter(); render();
</script>
