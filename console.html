<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BLACKVAULT // Security Study Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#050706; --panel:#0b0f0d; --panel2:#101512; --bone:#e9e7dc; --ash:#878d85;
  --blood:#fb3640; --volt:#2de2e6; --amber:#f4b740; --line:rgba(233,231,220,.13);
  --grot:'Space Grotesk',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'Space Mono',ui-monospace,'SFMono-Regular',Menlo,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--void); color:var(--bone); font-family:var(--grot);
  font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased;
  background-image:
    linear-gradient(rgba(45,226,230,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(45,226,230,.025) 1px,transparent 1px);
  background-size:44px 44px; min-height:100vh;
}
body::after{content:""; position:fixed; inset:0; pointer-events:none; z-index:9;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,.16) 0 1px,transparent 1px 3px);
  opacity:.35; mix-blend-mode:multiply;}
a{color:inherit}
::selection{background:var(--blood); color:var(--void)}

.topbar{position:sticky; top:0; z-index:20; background:rgba(5,7,6,.92); backdrop-filter:blur(6px); border-bottom:2px solid var(--bone);}
.topbar__in{max-width:1180px; margin:0 auto; padding:14px 20px; display:flex; align-items:center; gap:18px; flex-wrap:wrap}
.brand{display:flex; align-items:baseline; gap:10px; cursor:pointer; user-select:none}
.brand b{font-weight:700; letter-spacing:-.02em; font-size:20px}
.brand b i{color:var(--blood); font-style:normal}
.brand span{font-family:var(--mono); font-size:10px; letter-spacing:.32em; color:var(--ash); text-transform:uppercase}
.nav{display:flex; gap:6px; flex-wrap:wrap; margin-left:auto}
.nav button{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ash); background:transparent; border:1.5px solid transparent; padding:7px 11px; cursor:pointer; transition:.12s;}
.nav button:hover{color:var(--bone); border-color:var(--line)}
.nav button[aria-current="true"]{color:var(--void); background:var(--bone); border-color:var(--bone)}
.meter{display:flex; align-items:center; gap:9px; font-family:var(--mono); font-size:10px; color:var(--ash); letter-spacing:.1em}
.meter__bar{width:90px; height:8px; border:1.5px solid var(--bone); position:relative}
.meter__fill{position:absolute; inset:0; width:0%; background:var(--blood); transition:width .5s}

main{max-width:1180px; margin:0 auto; padding:32px 20px 90px}
.eyebrow{font-family:var(--mono); font-size:11px; letter-spacing:.3em; text-transform:uppercase; color:var(--volt)}
.h1{font-size:clamp(28px,5vw,46px); font-weight:700; letter-spacing:-.03em; line-height:1.02; margin:8px 0 0}
.lede{color:var(--ash); max-width:64ch; margin:14px 0 0}
.btn{font-family:var(--mono); font-size:12px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; background:var(--bone); color:var(--void); border:2px solid var(--bone); padding:10px 16px; box-shadow:5px 5px 0 var(--blood); transition:.12s;}
.btn:hover{transform:translate(-2px,-2px); box-shadow:7px 7px 0 var(--blood)}
.btn:active{transform:translate(2px,2px); box-shadow:2px 2px 0 var(--blood)}
.btn--ghost{background:transparent; color:var(--bone); box-shadow:5px 5px 0 rgba(45,226,230,.5)}
.btn--ghost:hover{box-shadow:7px 7px 0 var(--volt)}

.chip{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; padding:2px 7px; border:1.5px solid; display:inline-block}
.t-DF{color:var(--amber); border-color:var(--amber)}
.t-RE{color:var(--volt); border-color:var(--volt)}
.t-MA{color:var(--blood); border-color:var(--blood)}
.dot{width:9px; height:9px; display:inline-block; border-radius:50%}
.d-DF{background:var(--amber)} .d-RE{background:var(--volt)} .d-MA{background:var(--blood)}

.maphead{display:flex; justify-content:space-between; align-items:flex-end; gap:20px; flex-wrap:wrap; margin-bottom:26px}
.legend{display:flex; gap:16px; font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; color:var(--ash); flex-wrap:wrap}
.legend i{display:inline-flex; align-items:center; gap:7px; font-style:normal}
.spine{display:grid; grid-template-columns:repeat(3,1fr); gap:14px}
.node{position:relative; background:var(--panel); border:2px solid var(--line); padding:16px 16px 14px; cursor:pointer; transition:.14s; overflow:hidden; min-height:148px; display:flex; flex-direction:column;}
.node:hover{transform:translateY(-3px); border-color:var(--bone); box-shadow:6px 6px 0 rgba(45,226,230,.32)}
.node::before{content:""; position:absolute; left:0; top:0; bottom:0; width:4px; background:var(--accent,var(--ash))}
.node__n{font-family:var(--mono); font-size:11px; color:var(--ash); letter-spacing:.18em}
.node__t{font-weight:600; font-size:17px; letter-spacing:-.01em; margin:6px 0 8px; line-height:1.12}
.node__tags{font-family:var(--mono); font-size:10.5px; color:var(--ash); line-height:1.5; margin-top:auto}
.node__chips{display:flex; gap:5px; margin:10px 0 0; flex-wrap:wrap}
.node__mast{height:6px; border:1.5px solid var(--line); margin-top:11px; position:relative}
.node__mast i{position:absolute; inset:0; width:0%; background:var(--accent,var(--ash)); transition:width .5s}
.node[data-done="1"]{border-color:var(--accent)}
.node__check{position:absolute; top:12px; right:13px; font-family:var(--mono); font-size:11px; color:var(--accent); opacity:0}
.node[data-done="1"] .node__check{opacity:1}

.crumb{font-family:var(--mono); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--ash); margin-bottom:18px; display:flex; gap:10px; align-items:center; flex-wrap:wrap}
.crumb a{cursor:pointer; color:var(--volt)}
.studyhead{border-bottom:2px solid var(--bone); padding-bottom:18px; margin-bottom:24px}
.idea{border-left:4px solid var(--accent,var(--blood)); background:var(--panel); padding:14px 18px; margin:0 0 24px; font-size:17px;}
.idea b{color:var(--accent,var(--blood))}
.deepbox{border:2px solid var(--accent,var(--volt)); background:var(--panel2); padding:16px 20px; margin:0 0 30px; box-shadow:5px 5px 0 rgba(45,226,230,.18)}
.deepbox .lbl{font-family:var(--mono); font-size:10px; letter-spacing:.22em; text-transform:uppercase; color:var(--accent,var(--volt))}
.deepbox p{margin:9px 0 0; font-size:15.5px; line-height:1.6}
.sec{margin:0 0 30px}
.sec__h{font-family:var(--mono); font-size:12px; letter-spacing:.22em; text-transform:uppercase; color:var(--ash); display:flex; align-items:center; gap:10px; margin:0 0 14px}
.sec__h::after{content:""; flex:1; height:1px; background:var(--line)}
.concept{border:2px solid var(--line); background:var(--panel); padding:14px 16px; margin-bottom:10px; display:flex; gap:14px; align-items:flex-start; transition:.12s}
.concept:hover{border-color:var(--accent)}
.concept__b{flex:1}
.concept__t{font-weight:600; font-size:15.5px; margin:0 0 4px}
.concept__d{color:var(--ash); font-size:14.5px; margin:0}
.learnbtn{flex:none; font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; background:transparent; color:var(--ash); border:1.5px solid var(--line); padding:6px 9px; transition:.12s; white-space:nowrap; margin-top:2px;}
.learnbtn:hover{color:var(--bone); border-color:var(--bone)}
.learnbtn[data-on="1"]{background:var(--accent); color:var(--void); border-color:var(--accent)}
.cmd{display:flex; gap:14px; align-items:baseline; padding:9px 0; border-bottom:1px dashed var(--line); flex-wrap:wrap}
.cmd:last-child{border-bottom:0}
.cmd code{font-family:var(--mono); font-size:13px; color:var(--volt); background:var(--panel2); padding:3px 8px; border:1px solid var(--line); white-space:pre-wrap; cursor:pointer}
.cmd code:hover{border-color:var(--volt)}
.cmd span{color:var(--ash); font-size:13.5px}
.tlist,.rlist{list-style:none; padding:0; margin:0}
.tlist li{border-left:3px solid var(--blood); padding:7px 0 7px 14px; margin-bottom:8px; color:var(--ash); font-size:14.5px}
.rlist li{border-left:3px solid var(--volt); padding:7px 0 7px 14px; margin-bottom:8px; color:var(--bone); font-size:14.5px}
.feeds{font-family:var(--mono); font-size:12px; color:var(--ash); border:1.5px dashed var(--line); padding:12px 14px}
.feeds b{color:var(--amber)}
.studynav{display:flex; justify-content:space-between; gap:12px; margin-top:30px; flex-wrap:wrap}

.modehead{margin-bottom:24px}
.deckpick,.casepick{display:flex; gap:8px; flex-wrap:wrap; margin:18px 0 26px}
.deckpick button,.casepick button{font-family:var(--mono); font-size:11px; letter-spacing:.08em; text-transform:uppercase; cursor:pointer; background:transparent; color:var(--ash); border:1.5px solid var(--line); padding:7px 11px; transition:.12s}
.deckpick button:hover,.casepick button:hover{color:var(--bone); border-color:var(--bone)}
.deckpick button[aria-current="true"]{background:var(--volt); color:var(--void); border-color:var(--volt)}
.casepick button[aria-current="true"]{background:var(--blood); color:var(--void); border-color:var(--blood)}
.cardstage{display:flex; flex-direction:column; align-items:center; gap:20px}
.flashcard{width:min(620px,100%); height:300px; perspective:1600px; cursor:pointer}
.flashcard__in{position:relative; width:100%; height:100%; transition:transform .5s; transform-style:preserve-3d}
.flashcard[data-flip="1"] .flashcard__in{transform:rotateY(180deg)}
.face{position:absolute; inset:0; backface-visibility:hidden; border:2px solid var(--bone); background:var(--panel); padding:28px; display:flex; flex-direction:column; justify-content:center; align-items:center; text-align:center}
.face--front{box-shadow:8px 8px 0 var(--blood)}
.face--back{transform:rotateY(180deg); box-shadow:8px 8px 0 var(--volt); border-color:var(--volt)}
.face small{position:absolute; top:14px; left:16px; font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--ash)}
.face .q{font-size:22px; font-weight:600; line-height:1.25}
.face .a{font-size:16.5px; color:var(--bone); line-height:1.45}
.face .hint{position:absolute; bottom:14px; font-family:var(--mono); font-size:9.5px; letter-spacing:.15em; text-transform:uppercase; color:var(--ash)}
.cardctl{display:flex; align-items:center; gap:12px; font-family:var(--mono); font-size:12px; color:var(--ash); flex-wrap:wrap; justify-content:center}
.iconbtn{font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase; cursor:pointer; background:transparent; color:var(--bone); border:1.5px solid var(--bone); padding:8px 13px; transition:.12s}
.iconbtn:hover{background:var(--bone); color:var(--void)}
.iconbtn--know{border-color:var(--amber); color:var(--amber)}
.iconbtn--know:hover{background:var(--amber); color:var(--void)}
.counter{min-width:70px; text-align:center; letter-spacing:.12em}

.quizwrap{max-width:760px}
.qcard{border:2px solid var(--line); background:var(--panel); padding:20px 22px; margin-bottom:16px}
.qcard__meta{font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--ash); display:flex; justify-content:space-between; margin-bottom:10px; gap:10px; align-items:center}
.qcard__q{font-weight:600; font-size:17px; margin:0 0 14px; line-height:1.3}
.opt{display:block; width:100%; text-align:left; font-family:var(--grot); font-size:15px; color:var(--bone); background:var(--panel2); border:1.5px solid var(--line); padding:11px 14px; margin-bottom:8px; cursor:pointer; transition:.1s}
.opt:hover:not(:disabled){border-color:var(--bone)}
.opt:disabled{cursor:default}
.opt[data-state="selected"]{border-color:var(--bone); background:rgba(233,231,220,.07)}
.opt[data-state="correct"]{border-color:var(--amber); background:rgba(244,183,64,.12); color:var(--bone)}
.opt[data-state="wrong"]{border-color:var(--blood); background:rgba(251,54,64,.1)}
.opt b{font-family:var(--mono); margin-right:8px; color:var(--ash)}
.explain{font-size:14px; color:var(--ash); border-left:3px solid var(--amber); padding:8px 0 8px 14px; margin-top:6px}
.explain b{color:var(--amber); font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase}
.miniretry{font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; cursor:pointer; background:transparent; color:var(--volt); border:1.5px solid var(--volt); padding:5px 9px; transition:.12s}
.miniretry:hover{background:var(--volt); color:var(--void)}
.score{font-family:var(--mono); border:2px solid var(--bone); padding:14px 18px; margin-bottom:22px; display:flex; justify-content:space-between; align-items:center; gap:14px; flex-wrap:wrap}
.score b{font-size:24px; color:var(--blood)}
.emptybox{border:2px dashed var(--line); padding:28px; text-align:center; color:var(--ash)}
.emptybox b{color:var(--bone); font-size:18px; display:block; margin-bottom:8px; font-family:var(--grot)}

.search{width:100%; font-family:var(--mono); font-size:14px; background:var(--panel); color:var(--bone); border:2px solid var(--bone); padding:12px 14px; margin-bottom:22px}
.search:focus{outline:none; border-color:var(--volt); box-shadow:4px 4px 0 var(--volt)}
.arsenal{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:14px}
.tool{border:2px solid var(--line); background:var(--panel); padding:14px 16px}
.tool code{font-family:var(--mono); font-size:13.5px; color:var(--volt); cursor:pointer}
.tool p{margin:5px 0 0; color:var(--ash); font-size:13.5px}
.tool small{font-family:var(--mono); font-size:9.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--ash)}

.threadgrid{display:grid; grid-template-columns:1fr; gap:18px}
.thread{border:2px solid var(--line); background:var(--panel); padding:20px 22px}
.thread__h{display:flex; align-items:center; gap:12px; margin-bottom:6px}
.thread__h h3{margin:0; font-size:20px; letter-spacing:-.01em}
.thread__blurb{color:var(--ash); margin:0 0 16px; max-width:72ch}
.pyramid{display:flex; flex-direction:column; gap:6px; align-items:center}
.ptier{border:2px solid; padding:9px 14px; text-align:center; cursor:pointer; transition:.12s; font-family:var(--mono); font-size:12.5px; letter-spacing:.04em; position:relative}
.ptier:hover{transform:scale(1.015)}
.ptier b{display:block; font-family:var(--grot); font-size:15px; letter-spacing:0; text-transform:none}
.ptier .note{display:none; font-family:var(--grot); font-size:13px; color:var(--bone); margin-top:6px; letter-spacing:0; text-transform:none}
.ptier[data-open="1"] .note{display:block}
.kc{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:8px}
.kcstage{border:1.5px solid var(--line); padding:11px 13px; cursor:pointer; transition:.12s}
.kcstage:hover{border-color:var(--volt)}
.kcstage b{font-family:var(--mono); font-size:9.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--volt); display:block}
.kcstage span{font-size:13px; color:var(--bone)}
.kcstage .map{display:none; font-family:var(--mono); font-size:11px; color:var(--ash); margin-top:6px}
.kcstage[data-open="1"] .map{display:block}
.xv{width:100%; border-collapse:collapse; font-size:13.5px}
.xv th,.xv td{border:1px solid var(--line); padding:9px 11px; text-align:left}
.xv th{font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--ash)}
.xv code{font-family:var(--mono); color:var(--volt); font-size:12.5px}
.loop{display:flex; gap:10px; flex-wrap:wrap; align-items:center}
.loopstep{border:2px solid var(--accent,var(--amber)); padding:10px 14px; font-family:var(--mono); font-size:12px; letter-spacing:.06em; text-transform:uppercase}
.looparr{color:var(--ash); font-family:var(--mono)}

.casewrap{max-width:780px}
.casebar{display:flex; justify-content:space-between; align-items:center; gap:14px; font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ash); border:1.5px dashed var(--line); padding:10px 14px; margin-bottom:18px; flex-wrap:wrap}
.casebar b{color:var(--amber)}
.casenode{border:2px solid var(--bone); background:var(--panel); padding:22px 24px; box-shadow:7px 7px 0 var(--blood)}
.casenode .clock{font-family:var(--mono); font-size:12px; letter-spacing:.16em; color:var(--blood)}
.casenode p{font-size:16.5px; line-height:1.5}
.choice{display:block; width:100%; text-align:left; font-family:var(--grot); font-size:15px; color:var(--bone); background:var(--panel2); border:1.5px solid var(--line); padding:13px 16px; margin-top:10px; cursor:pointer; transition:.1s}
.choice:hover{border-color:var(--volt); transform:translateX(3px)}
.fb{border-left:3px solid; padding:10px 0 10px 14px; margin-top:14px; font-size:14.5px}
.fb--good{border-color:var(--amber)} .fb--good b{color:var(--amber)}
.fb--bad{border-color:var(--blood)} .fb--bad b{color:var(--blood)}
.fb b{font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; display:block; margin-bottom:3px}

footer{max-width:1180px; margin:0 auto; padding:26px 20px 40px; border-top:1px solid var(--line); font-family:var(--mono); font-size:11px; letter-spacing:.08em; color:var(--ash); display:flex; justify-content:space-between; gap:14px; flex-wrap:wrap}
.toast{position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); opacity:0; background:var(--bone); color:var(--void); font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; padding:9px 16px; border:2px solid var(--void); z-index:50; transition:.25s; pointer-events:none}
.toast[data-show="1"]{opacity:1; transform:translateX(-50%) translateY(0)}

@media(max-width:780px){
  .spine{grid-template-columns:1fr 1fr}
  .nav{width:100%; order:3; overflow-x:auto; padding-bottom:2px; flex-wrap:nowrap}
  .meter{order:2; margin-left:auto}
}
@media(max-width:520px){ .spine{grid-template-columns:1fr} .flashcard{height:264px} }
@media(prefers-reduced-motion:reduce){ *{transition:none!important; animation:none!important} body::after{display:none} }

/* ===== RANGE / interactive labs ===== */
.labgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:16px; margin-top:8px}
.labcard{border:2px solid var(--line); background:var(--panel); padding:18px; cursor:pointer; transition:.12s; position:relative; overflow:hidden}
.labcard:hover{border-color:var(--volt); transform:translate(-2px,-2px); box-shadow:6px 6px 0 rgba(45,226,230,.35)}
.labcard h3{margin:8px 0 6px; font-size:18px; letter-spacing:-.01em}
.labcard p{color:var(--ash); font-size:13.5px; margin:0 0 12px}
.labcard .prog{font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--ash)}
.labcard .pbar{height:6px; border:1.5px solid var(--line); margin-top:6px; position:relative}
.labcard .pbar i{position:absolute; inset:0; background:var(--volt); width:0}
.labcard[data-done="1"]{border-color:var(--amber)} .labcard[data-done="1"] .pbar i{background:var(--amber)}
.labtop{display:flex; gap:12px; align-items:center; flex-wrap:wrap; margin:4px 0 18px}
.labtop .btn{padding:7px 13px; box-shadow:3px 3px 0 var(--volt)}
.objbox{border:1.5px solid var(--line); background:var(--panel); padding:14px 16px; margin:0 0 18px}
.objbox h4{margin:0 0 10px; font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--volt); text-transform:uppercase}
.obj{display:flex; gap:10px; align-items:flex-start; padding:5px 0; font-size:14px; color:var(--ash)}
.obj b{font-family:var(--mono); font-size:14px; line-height:1.3}
.obj[data-on="1"]{color:var(--bone)} .obj[data-on="1"] b{color:var(--amber)}
.obj .tick{display:inline-block; width:16px; text-align:center; color:var(--ash)}
.obj[data-on="1"] .tick{color:var(--amber)}

/* terminal */
.term{background:#04100c; border:1.5px solid var(--line); font-family:var(--mono); font-size:13px; line-height:1.5}
.term__out{padding:14px 16px; max-height:430px; overflow:auto; white-space:pre-wrap; color:#bfe9d8}
.term__out .pmt{color:var(--volt)} .term__out .err{color:var(--blood)} .term__out .hl{color:var(--amber)} .term__out .dim{color:var(--ash)}
.term__in{display:flex; align-items:center; gap:8px; border-top:1.5px solid var(--line); padding:9px 14px; background:#061a13}
.term__in span{color:var(--volt); font-family:var(--mono); font-size:13px}
.term__in input{flex:1; background:transparent; border:0; outline:0; color:var(--bone); font-family:var(--mono); font-size:13px}
.qchips{display:flex; gap:6px; flex-wrap:wrap; margin:10px 0 0}
.qchips button{font-family:var(--mono); font-size:11px; color:var(--ash); background:var(--panel2); border:1px solid var(--line); padding:4px 9px; cursor:pointer}
.qchips button:hover{color:var(--bone); border-color:var(--volt)}

/* findings form */
